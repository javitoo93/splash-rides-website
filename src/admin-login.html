<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIX: Content Security Policy — blocks inline script injection and restricts resource origins -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src https://fonts.gstatic.com;
        connect-src 'self' https://boatride-api.onrender.com;
        img-src 'self' data: https:;
    ">
    <title>BoatRide Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <svg class="w-12 h-12 text-blue-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <h1 class="text-2xl font-bold text-gray-900">BoatRide Admin</h1>
            <p class="text-gray-500 mt-2">Sign in to access the admin dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6" autocomplete="off">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required autocomplete="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="admin@boatride.app">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="••••••••">
            </div>

            <div id="error" class="text-red-600 text-sm hidden"></div>

            <!-- FIX: Rate-limit indicator shown to user when locked out -->
            <div id="lockoutMsg" class="hidden text-center text-red-600 text-sm font-medium bg-red-50 border border-red-200 rounded-lg p-3">
                Too many failed attempts. Please wait <span id="lockoutCountdown">30</span>s.
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Admin access only. Contact support if you need access.
        </p>
    </div>

    <script>
        const API_BASE = 'https://boatride-api.onrender.com/api';

        // FIX: Rate limiting — track failed attempts in sessionStorage (cleared on tab close)
        const RATE_LIMIT_KEY = 'adminLoginAttempts';
        const LOCKOUT_KEY = 'adminLoginLockout';
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_DURATION_MS = 30000; // 30 seconds

        function getAttempts() {
            return parseInt(sessionStorage.getItem(RATE_LIMIT_KEY) || '0');
        }

        function incrementAttempts() {
            const attempts = getAttempts() + 1;
            sessionStorage.setItem(RATE_LIMIT_KEY, attempts);
            if (attempts >= MAX_ATTEMPTS) {
                sessionStorage.setItem(LOCKOUT_KEY, Date.now() + LOCKOUT_DURATION_MS);
            }
            return attempts;
        }

        function isLockedOut() {
            const lockoutUntil = parseInt(sessionStorage.getItem(LOCKOUT_KEY) || '0');
            if (Date.now() < lockoutUntil) return lockoutUntil;
            // Expired — clear
            if (lockoutUntil > 0) {
                sessionStorage.removeItem(LOCKOUT_KEY);
                sessionStorage.removeItem(RATE_LIMIT_KEY);
            }
            return false;
        }

        function startLockoutCountdown(lockoutUntil) {
            const submitBtn = document.getElementById('submitBtn');
            const lockoutMsg = document.getElementById('lockoutMsg');
            const countdownEl = document.getElementById('lockoutCountdown');
            const form = document.getElementById('loginForm');

            submitBtn.disabled = true;
            lockoutMsg.classList.remove('hidden');
            form.querySelectorAll('input').forEach(i => i.disabled = true);

            const interval = setInterval(() => {
                const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(interval);
                    submitBtn.disabled = false;
                    lockoutMsg.classList.add('hidden');
                    form.querySelectorAll('input').forEach(i => i.disabled = false);
                    sessionStorage.removeItem(LOCKOUT_KEY);
                    sessionStorage.removeItem(RATE_LIMIT_KEY);
                } else {
                    countdownEl.textContent = remaining;
                }
            }, 500);
        }

        // FIX: Use sessionStorage instead of localStorage — cleared when tab is closed,
        // reducing the window for token theft. Ideal fix is httpOnly cookie (requires backend).
        const existingToken = sessionStorage.getItem('adminToken');
        if (existingToken) {
            window.location.replace('/admin-dashboard.html');
        }

        // Check if already locked out on page load
        const lockoutUntil = isLockedOut();
        if (lockoutUntil) {
            startLockoutCountdown(lockoutUntil);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // FIX: Check rate limit before submitting
            const lockout = isLockedOut();
            if (lockout) {
                startLockoutCountdown(lockout);
                return;
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            const submitBtn = document.getElementById('submitBtn');

            errorEl.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                if (!data.token) {
                    throw new Error('No token received');
                }

                // FIX: Admin check — verify server-side via /users/me
                const userResponse = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${data.token}` }
                });

                if (!userResponse.ok) {
                    throw new Error('Failed to verify identity');
                }

                const userData = await userResponse.json();

                if (!userData.is_admin) {
                    throw new Error('Admin access required');
                }

                // Reset failed attempts on successful login
                sessionStorage.removeItem(RATE_LIMIT_KEY);
                sessionStorage.removeItem(LOCKOUT_KEY);

                // FIX: sessionStorage instead of localStorage
                sessionStorage.setItem('adminToken', data.token);
                window.location.replace('/admin-dashboard.html');

            } catch (error) {
                // FIX: Increment failed attempt counter
                const attempts = incrementAttempts();
                const newLockout = isLockedOut();

                // Generic error message — don't reveal whether email/password was wrong
                errorEl.textContent = newLockout
                    ? `Too many failed attempts. Please wait 30 seconds.`
                    : `Invalid credentials. ${MAX_ATTEMPTS - attempts} attempt(s) remaining.`;
                errorEl.classList.remove('hidden');

                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';

                if (newLockout) {
                    startLockoutCountdown(newLockout);
                }
            }
        });
    </script>
</body>
</html>
